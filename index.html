<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roblox Gem Finder</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #09090f;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            color: #e5e7eb;
            min-height: 100vh;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 218px;
            background: linear-gradient(180deg, #0d0d1c 0%, #0d0d1c 100%);
            border-right: 1px solid rgba(124, 58, 237, 0.18);
            padding: 24px 12px;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 8px;
            margin-bottom: 32px;
            cursor: pointer;
        }

        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .logo-text {
            font-weight: 900;
            letter-spacing: 2px;
            font-size: 13px;
            line-height: 1.2;
        }

        .logo-text .gem { color: #fff; }
        .logo-text .finder { color: #a78bfa; }

        .nav-menu {
            list-style: none;
            flex: 1;
        }

        .nav-item { margin-bottom: 8px; }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 12px;
            color: #6b7280;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .nav-link:hover {
            color: #d1d5db;
            background: rgba(124, 58, 237, 0.1);
        }

        .nav-link.active {
            color: #a78bfa;
            background: rgba(124, 58, 237, 0.14);
            border-left: 2px solid #7c3aed;
            padding-left: 10px;
        }

        .nav-divider {
            height: 1px;
            background: rgba(124, 58, 237, 0.1);
            margin: 16px 0;
        }

        .nav-footer {
            margin-top: auto;
            padding-top: 16px;
            border-top: 1px solid rgba(124, 58, 237, 0.1);
        }

        /* MAIN CONTENT */
        .main-content {
            margin-left: 218px;
            flex: 1;
            overflow-y: auto;
            background: #09090f;
        }

        /* HEADER BAR */
        .header {
            background: #0d0d1c;
            border-bottom: 1px solid rgba(124, 58, 237, 0.14);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
        }

        .search-box {
            flex: 1;
            max-width: 400px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 8px;
            padding: 10px 16px;
            color: #e5e7eb;
            font-size: 13px;
        }

        .search-box input::placeholder {
            color: #6b7280;
        }

        .header-stats {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        .header-stat {
            text-align: right;
        }

        .header-stat-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        .header-stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 20px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        .status-dot.live { background: #10b981; }
        .status-dot.idle { background: #6b7280; }
        .status-dot.offline { background: #ef4444; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .status-text {
            font-size: 12px;
            color: #d1d5db;
            font-weight: 500;
        }

        /* HERO SECTION */
        .hero {
            background: linear-gradient(135deg, #3b0f8c, #6d28d9 38%, #7c3aed 62%, #4c1d95);
            padding: 32px 32px;
            display: grid;
            grid-template-columns: auto 1fr;
            gap: 24px;
            align-items: flex-start;
            position: relative;
            overflow: hidden;
            min-height: 320px;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(167, 139, 250, 0.15), transparent 70%);
            border-radius: 50%;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(109, 40, 217, 0.2), transparent 70%);
            border-radius: 50%;
        }

        .hero-content {
            position: relative;
            z-index: 1;
        }

        .hero-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
        }

        .hero-content h1 {
            display: none;
        }

        .hero-content h1 .italic {
            font-style: italic;
            color: #c4b5fd;
        }

        .hero-btn {
            display: none;
        }

        .hero-btn:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .hero-robot {
            position: relative;
            z-index: 1;
            font-size: 120px;
            text-align: center;
            opacity: 0.9;
            display: none;
        }

        /* CONSOLE PANEL */
        .console-panel {
            background: #0d0d1c;
            border: 1px solid rgba(124, 58, 237, 0.2);
            border-radius: 16px;
            padding: 16px;
            display: flex;
            flex-direction: column;
            height: 280px;
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 600px;
        }

        .console-header {
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 12px;
        }

        .console-body {
            flex: 1;
            background: #13131f;
            border-radius: 10px;
            padding: 12px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #10b981;
            line-height: 1.5;
        }

        .console-line {
            margin-bottom: 4px;
            opacity: 0.9;
        }

        /* CONTAINER */
        .container {
            padding: 32px;
        }

        .section-header {
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(124, 58, 237, 0.2);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: #a78bfa;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background: #a78bfa;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* GAMES GRID */
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
            gap: 20px;
            margin-bottom: 48px;
        }

        .game-card {
            background: #0f0f1d;
            border: 1px solid rgba(124, 58, 237, 0.17);
            border-radius: 14px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
        }

        .game-card:hover {
            border-color: rgba(124, 58, 237, 0.4);
            box-shadow: 0 8px 24px rgba(124, 58, 237, 0.15);
            transform: translateY(-4px);
        }

        .game-card-header {
            height: 150px;
            background: linear-gradient(135deg, #1e0845 0%, #6d28d9 100%);
            padding: 16px;
            display: flex;
            align-items: flex-end;
        }

        .game-card-header.blue { background: linear-gradient(135deg, #0a1628 0%, #1d4ed8 100%); }
        .game-card-header.green { background: linear-gradient(135deg, #052e16 0%, #15803d 100%); }
        .game-card-header.red { background: linear-gradient(135deg, #3b0408 0%, #b91c1c 100%); }

        .game-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
        }

        .game-card-body {
            padding: 16px;
        }

        .game-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
            margin-bottom: 12px;
        }

        .game-stat {
            background: #13131f;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(124, 58, 237, 0.15);
            text-align: center;
        }

        .game-stat-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            color: #a78bfa;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .game-stat-value {
            font-size: 13px;
            font-weight: 700;
            color: #e5e7eb;
        }

        .game-link {
            display: block;
            color: #a78bfa;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            margin-bottom: 12px;
            word-break: break-all;
            transition: color 0.2s;
        }

        .game-link:hover { color: #c4b5fd; }

        .game-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-archive {
            background: rgba(124, 58, 237, 0.2);
            color: #a78bfa;
            border: 1px solid rgba(124, 58, 237, 0.3);
        }

        .btn-archive:hover {
            background: rgba(124, 58, 237, 0.3);
        }

        .btn-play {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            color: #fff;
        }

        .btn-play:hover {
            opacity: 0.9;
        }

        /* EMPTY STATE */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: linear-gradient(135deg, #0f0f1d 0%, #13131f 100%);
            border: 1px dashed rgba(124, 58, 237, 0.2);
            border-radius: 14px;
        }

        .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.6; }
        .empty-text { color: #9ca3af; font-size: 14px; }
        .empty-subtext { color: #6b7280; font-size: 12px; margin-top: 8px; }

        @media (max-width: 1200px) {
            .hero { grid-template-columns: 1fr; }
            .hero-robot { font-size: 80px; }
        }

        @media (max-width: 768px) {
            .sidebar { width: 100%; height: auto; position: relative; border-right: none; padding: 16px; }
            .main-content { margin-left: 0; }
            .header { flex-direction: column; padding: 16px; }
            .header-stats { width: 100%; justify-content: space-around; }
            .search-box { max-width: none; }
            .hero { padding: 24px 16px; grid-template-columns: 1fr; }
            .container { padding: 16px; }
            .games-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">◈</div>
            <div class="logo-text"><span class="gem">GEM</span><br><span class="finder">FINDER</span></div>
        </div>
        <nav class="nav-menu">
            <li class="nav-item"><a href="#" class="nav-link active" data-section="games">🏠 Home</a></li>
            <li class="nav-item"><a href="#" class="nav-link" data-section="archived">📦 Archive</a></li>
        </nav>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- HEADER -->
        <div class="header">
            <div class="search-box">
                <input type="text" id="search-input" placeholder="Search game name, team...">
            </div>
            <div class="header-stats">
                <div class="status-badge">
                    <div class="status-dot live" id="status-dot"></div>
                    <span class="status-text" id="status-text">Live</span>
                </div>
                <div class="header-stat">
                    <div class="header-stat-label">Last Scan</div>
                    <div class="header-stat-value" id="last-scan-time">Never</div>
                </div>
            </div>
        </div>

        <!-- HERO SECTION -->
        <section class="hero">
            <div class="hero-content">
                <div class="hero-badge">◆ ROBLOX GEM FINDER</div>
                <h1>Each Week We Find Super Cool <span class="italic">Hidden Gems For Your Loyal Gamers</span></h1>
                <button class="hero-btn">+ Browse New Games</button>
            </div>
            <div class="console-panel">
                <div class="console-header">📟 Console</div>
                <div class="console-body" id="console-logs">
                    <div class="console-line">Ready to scan...</div>
                </div>
            </div>
            <div class="hero-robot">🤖</div>
        </section>

        <!-- CONTENT -->
        <div class="container">
            <!-- NEW GAMES -->
            <section id="games-section">
                <h2 class="section-header">
                    🆕 New Games Found
                    <span class="live-badge"><span class="live-dot"></span> LIVE</span>
                </h2>
                <div class="games-grid" id="games-container"></div>
            </section>

            <!-- ARCHIVED GAMES -->
            <section id="archived-section" style="display: none;">
                <h2 class="section-header">📦 Archived Games</h2>
                <div class="games-grid" id="archived-container"></div>
            </section>
        </div>
    </main>

    <script>
        const GRADIENT_CLASSES = ['blue', 'green', 'red'];
        let gameIndex = 0;
        let allGames = [];

        async function loadStats() {
            try {
                const response = await fetch('/api/stats');
                const stats = await response.json();
                const lastScan = stats.last_scan ? new Date(stats.last_scan).toLocaleTimeString() : 'Never';
                document.getElementById('last-scan-time').textContent = lastScan;
                updateStatus();
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        function updateStatus() {
            const lastScanEl = document.getElementById('last-scan-time');
            const lastScanText = lastScanEl.textContent;
            const statusDot = document.getElementById('status-dot');
            const statusText = document.getElementById('status-text');

            if (lastScanText === 'Never') {
                statusDot.className = 'status-dot offline';
                statusText.textContent = 'Offline';
            } else {
                const lastScanTime = new Date(lastScanText);
                const now = new Date();
                const diffMinutes = (now - lastScanTime) / (1000 * 60);

                if (diffMinutes < 20) {
                    statusDot.className = 'status-dot live';
                    statusText.textContent = 'Live';
                } else {
                    statusDot.className = 'status-dot idle';
                    statusText.textContent = 'Idle';
                }
            }
        }

        async function loadGames() {
            try {
                const container = document.getElementById('games-container');
                container.innerHTML = '<div style="grid-column: 1/-1; padding: 40px; text-align: center;"><div style="font-size: 20px; margin-bottom: 10px;">⏳</div></div>';

                const response = await fetch('/api/games');
                allGames = await response.json();

                if (!allGames || allGames.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1/-1;"><div class="empty-state"><div class="empty-icon">🔍</div><div class="empty-text">No new games found yet</div><div class="empty-subtext">The scanner surfaces hidden Roblox games automatically</div></div></div>';
                    return;
                }

                gameIndex = 0;
                container.innerHTML = allGames.map(game => {
                    const gradClass = GRADIENT_CLASSES[gameIndex++ % GRADIENT_CLASSES.length];
                    return `
                        <div class="game-card">
                            <div class="game-card-header ${gradClass}">
                                <div class="game-title">${game.name || 'Unknown'}</div>
                            </div>
                            <div class="game-card-body">
                                <div class="game-stats">
                                    <div class="game-stat">
                                        <div class="game-stat-label">👥 Players</div>
                                        <div class="game-stat-value">${(game.active_players || 0).toLocaleString()}</div>
                                    </div>
                                    <div class="game-stat">
                                        <div class="game-stat-label">📊 Visits</div>
                                        <div class="game-stat-value">${formatVisits(game.visits || 0)}</div>
                                    </div>
                                    <div class="game-stat">
                                        <div class="game-stat-label">👍 Approval</div>
                                        <div class="game-stat-value">${game.approval_rate || '?'}%</div>
                                    </div>
                                </div>
                                <a href="${game.url}" target="_blank" class="game-link">Open on Roblox →</a>
                                <div class="game-actions">
                                    <button class="btn btn-archive" onclick="archiveGame(${game.id})">Archive</button>
                                    <a href="${game.url}" target="_blank" class="btn btn-play">Play</a>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading games:', error);
            }
        }

        async function loadArchivedGames() {
            try {
                const container = document.getElementById('archived-container');
                const response = await fetch('/api/archived');
                const games = await response.json();

                if (!games || games.length === 0) {
                    container.innerHTML = '<div style="grid-column: 1/-1;"><div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No archived games yet</div></div></div>';
                    return;
                }

                gameIndex = 0;
                container.innerHTML = games.map(game => {
                    const gradClass = GRADIENT_CLASSES[gameIndex++ % GRADIENT_CLASSES.length];
                    return `
                        <div class="game-card">
                            <div class="game-card-header ${gradClass}">
                                <div class="game-title">${game.name || 'Unknown'}</div>
                            </div>
                            <div class="game-card-body">
                                <div class="game-stats">
                                    <div class="game-stat">
                                        <div class="game-stat-label">👥 Players</div>
                                        <div class="game-stat-value">${(game.active_players || 0).toLocaleString()}</div>
                                    </div>
                                    <div class="game-stat">
                                        <div class="game-stat-label">📊 Visits</div>
                                        <div class="game-stat-value">${formatVisits(game.visits || 0)}</div>
                                    </div>
                                    <div class="game-stat">
                                        <div class="game-stat-label">👍 Approval</div>
                                        <div class="game-stat-value">${game.approval_rate || '?'}%</div>
                                    </div>
                                </div>
                                <a href="${game.url}" target="_blank" class="game-link">Open on Roblox →</a>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error loading archived games:', error);
            }
        }

        async function archiveGame(gameId) {
            try {
                await fetch(`/api/games/${gameId}/archive`, { method: 'POST' });
                await loadGames();
                await loadArchivedGames();
            } catch (error) {
                console.error('Error archiving game:', error);
            }
        }

        function formatVisits(visits) {
            if (visits >= 1_000_000_000) return (visits / 1_000_000_000).toFixed(1) + 'B';
            if (visits >= 1_000_000) return (visits / 1_000_000).toFixed(1) + 'M';
            if (visits >= 1_000) return (visits / 1_000).toFixed(1) + 'K';
            return visits.toString();
        }

        // Navigation
        document.querySelectorAll('.nav-link').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                link.classList.add('active');

                const section = link.dataset.section;
                document.getElementById('games-section').style.display = section === 'games' ? 'block' : 'none';
                document.getElementById('archived-section').style.display = section === 'archived' ? 'block' : 'none';
            });
        });

        // Search functionality
        document.getElementById('search-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            if (!query) {
                loadGames();
                return;
            }

            const filtered = allGames.filter(game =>
                game.name.toLowerCase().includes(query)
            );

            const container = document.getElementById('games-container');
            if (filtered.length === 0) {
                container.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 40px;"><div style="color: #9ca3af;">No games match your search</div></div>';
                return;
            }

            gameIndex = 0;
            container.innerHTML = filtered.map(game => {
                const gradClass = GRADIENT_CLASSES[gameIndex++ % GRADIENT_CLASSES.length];
                return `
                    <div class="game-card">
                        <div class="game-card-header ${gradClass}">
                            <div class="game-title">${game.name}</div>
                        </div>
                        <div class="game-card-body">
                            <div class="game-stats">
                                <div class="game-stat">
                                    <div class="game-stat-label">👥 Players</div>
                                    <div class="game-stat-value">${(game.active_players || 0).toLocaleString()}</div>
                                </div>
                                <div class="game-stat">
                                    <div class="game-stat-label">📊 Visits</div>
                                    <div class="game-stat-value">${formatVisits(game.visits || 0)}</div>
                                </div>
                                <div class="game-stat">
                                    <div class="game-stat-label">👍 Approval</div>
                                    <div class="game-stat-value">${game.approval_rate || '?'}%</div>
                                </div>
                            </div>
                            <a href="${game.url}" target="_blank" class="game-link">Open on Roblox →</a>
                            <div class="game-actions">
                                <button class="btn btn-archive" onclick="archiveGame(${game.id})">Archive</button>
                                <a href="${game.url}" target="_blank" class="btn btn-play">Play</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        });

        window.addEventListener('load', async () => {
            await loadStats();
            await loadGames();
            await loadArchivedGames();

            setInterval(async () => {
                await loadStats();
                updateStatus();
            }, 10000);
        });
    </script>
</body>
</html>
